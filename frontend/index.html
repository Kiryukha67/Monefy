<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monefy Dashboard</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #2c3e50; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0;
        }
        .dashboard-card { 
            background: white; 
            padding: 30px; 
            border-radius: 15px; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.3); 
            text-align: center;
            width: 300px;
        }
        h1 { color: #34495e; font-size: 24px; margin-top: 0; }
        .account-name { color: #7f8c8d; font-size: 14px; text-transform: uppercase; letter-spacing: 1px;}
        .balance { font-size: 40px; color: #27ae60; font-weight: bold; margin: 15px 0; }
        .status { font-size: 12px; color: #e74c3c; }
    </style>
</head>
<body>

    <div class="dashboard-card">
        <h1>💰 Monefy Web</h1>
        <div class="account-name" id="acc-name">Завантаження...</div>
        <div class="balance" id="acc-balance">0.00 ₴</div>
        <div class="status" id="status-message"></div>
    </div>

    <script>
        // Робимо GET-запит до твого C++ бекенду
        fetch('http://localhost:8080/api/balance')
            .then(response => {
                if (!response.ok) throw new Error("Помилка мережі");
                return response.json();
            })
            .then(data => {
                // Вставляємо дані з C++ у наш HTML
                document.getElementById('acc-name').innerText = data.name;
                document.getElementById('acc-balance').innerText = data.balance + ' ₴';
                document.getElementById('status-message').innerText = "";
            })
            .catch(error => {
                console.error('Помилка:', error);
                document.getElementById('acc-name').innerText = "Помилка";
                document.getElementById('status-message').innerText = "Не вдалося підключитися до сервера. Перевір, чи запущений monefy_server.exe!";
            });
    </script>

</body>
</html>
