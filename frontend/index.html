<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Monefy Web | Сучасний облік фінансов</title>
    
    <!-- Підключення Chart.js з CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        /* --- CSS Змінні (Дизайн Система) --- */
        :root {
            --bg-body: #1e293b;        /* Глибокий темний фон екрану */
            --bg-app: #f1f5f9;         /* Світлий фон самого додатку */
            --bg-card: #ffffff;        /* Білі картки */
            --text-main: #0f172a;      /* Основний текст */
            --text-muted: #64748b;     /* Вторинний текст */
            
            --color-income: #10b981;   /* Яскраво-зелений для доходів */
            --color-expense: #ef4444;  /* Червоний для витрат */
            --color-primary: #3b82f6;  /* Синій для акцентів */
            
            --radius-main: 20px;
            --radius-btn: 14px;
            --shadow-card: 0 10px 15px -3px rgba(0, 0, 0, 0.05), 0 4px 6px -4px rgba(0, 0, 0, 0.05);
            --font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        /* --- Базові стилі --- */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: var(--font-family);
            background-color: var(--bg-body);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* Контейнер-емулятор мобільного екрану */
        .app-container {
            width: 100%;
            max-width: 420px;
            background-color: var(--bg-app);
            min-height: 100vh;
            position: relative;
            box-shadow: 0 0 40px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
        }

        /* --- Шапка (Header) --- */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 24px;
            background-color: var(--bg-card);
            border-bottom-left-radius: var(--radius-main);
            border-bottom-right-radius: var(--radius-main);
            box-shadow: var(--shadow-card);
            z-index: 10;
        }
        .header .logo { font-size: 20px; font-weight: 800; color: var(--color-primary); }
        .header .account-selector {
            background: #e2e8f0;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }
        .header .logout { font-size: 18px; cursor: pointer; background: none; border: none; }

        /* Основний контент */
        .content { padding: 20px; flex-grow: 1; display: flex; flex-direction: column; gap: 20px; }

        /* --- Блок балансу --- */
        .card {
            background-color: var(--bg-card);
            border-radius: var(--radius-main);
            padding: 24px;
            box-shadow: var(--shadow-card);
        }
        .balance-section { text-align: center; }
        .balance-label { font-size: 14px; color: var(--text-muted); font-weight: 500; text-transform: uppercase; letter-spacing: 1px; }
        .balance-amount { font-size: 42px; font-weight: 800; margin-top: 8px; letter-spacing: -1px; }

        /* --- Кнопки дій --- */
        .action-buttons { display: flex; gap: 15px; }
        .btn {
            flex: 1; padding: 16px 0; border: none; border-radius: var(--radius-btn);
            font-size: 16px; font-weight: 700; color: white; cursor: pointer;
            display: flex; justify-content: center; align-items: center; gap: 8px;
            transition: transform 0.1s, opacity 0.2s;
        }
        .btn:active { transform: scale(0.96); }
        .btn:hover { opacity: 0.9; }
        .btn-expense { background-color: var(--color-expense); }
        .btn-income { background-color: var(--color-income); }
        .btn-primary { background-color: var(--color-primary); width: 100%; margin-top: 15px;}

        /* --- Графік --- */
        .chart-section h3, .transactions-section h3 { font-size: 16px; margin-bottom: 16px; color: var(--text-main); }
        .chart-container { position: relative; height: 200px; width: 100%; display: flex; justify-content: center; }

        /* --- Список транзакцій --- */
        .transaction-item {
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 0; border-bottom: 1px solid #f1f5f9;
        }
        .transaction-item:last-child { border-bottom: none; padding-bottom: 0; }
        .tx-info { display: flex; align-items: center; gap: 12px; }
        .tx-icon {
            width: 40px; height: 40px; border-radius: 50%;
            background: #f1f5f9; display: flex; justify-content: center; align-items: center; font-size: 20px;
        }
        .tx-details h4 { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
        .tx-details p { font-size: 12px; color: var(--text-muted); }
        .tx-amount { font-weight: 700; font-size: 16px; }
        .tx-amount.income { color: var(--color-income); }
        .tx-amount.expense { color: var(--color-expense); }

        /* --- Модальне вікно (Popup) --- */
        .modal-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(4px);
            display: flex; flex-direction: column; justify-content: flex-end;
            opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
            z-index: 100;
        }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        
        .modal-content {
            background: var(--bg-card);
            border-top-left-radius: 24px; border-top-right-radius: 24px;
            padding: 24px; transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .modal-overlay.active .modal-content { transform: translateY(0); }
        
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .modal-header h2 { font-size: 20px; font-weight: 700; }
        .btn-close { background: none; border: none; font-size: 24px; color: var(--text-muted); cursor: pointer; }

        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 13px; color: var(--text-muted); margin-bottom: 6px; font-weight: 500;}
        .form-control {
            width: 100%; padding: 14px; border: 1px solid #e2e8f0;
            border-radius: 12px; font-size: 16px; font-family: inherit;
            background: #f8fafc; color: var(--text-main); outline: none; transition: border-color 0.2s;
        }
        .form-control:focus { border-color: var(--color-primary); background: #fff;}
        
        /* Приховуємо скролбар для краси */
        ::-webkit-scrollbar { width: 0px; }
    </style>
</head>
<body>

    <div class="app-container">
        
        <!-- Шапка -->
        <header class="header">
            <div class="logo">Monefy</div>
            <div class="account-selector" id="acc-name">Main Card</div>
            <button class="logout" title="Вихід">🚪</button>
        </header>

        <div class="content">
            <!-- Баланс -->
            <div class="card balance-section">
                <div class="balance-label">Загальний баланс</div>
                <div class="balance-amount" id="acc-balance">0.00 ₴</div>
            </div>

            <!-- Кнопки дій -->
            <div class="action-buttons">
                <button class="btn btn-expense" onclick="openModal('expense')">
                    <span style="font-size: 20px;">-</span> Витрата
                </button>
                <button class="btn btn-income" onclick="openModal('income')">
                    <span style="font-size: 20px;">+</span> Дохід
                </button>
            </div>

            <!-- Графік (Аналітика) -->
            <div class="card chart-section">
                <h3>Аналітика витрат</h3>
                <div class="chart-container">
                    <canvas id="expensesChart"></canvas>
                </div>
            </div>

            <!-- Останні транзакції -->
            <div class="card transactions-section">
                <h3>Останні транзакції</h3>
                <div id="transactions-list">
                    <!-- Транзакції будуть згенеровані через JS -->
                </div>
            </div>
        </div>

        <!-- Модальне вікно (Нижня панель) -->
        <div class="modal-overlay" id="transaction-modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2 id="modal-title">Нова транзакція</h2>
                    <button class="btn-close" onclick="closeModal()">×</button>
                </div>
                
                <div class="form-group">
                    <label>Сума (₴)</label>
                    <input type="number" id="tx-amount" class="form-control" placeholder="0.00" step="0.01" min="0">
                </div>
                
                <div class="form-group">
                    <label>Категорія</label>
                    <select id="tx-category" class="form-control">
                        <option value="1">🍔 Їжа та ресторани</option>
                        <option value="2">🚗 Транспорт</option>
                        <option value="3">🛒 Супермаркети</option>
                        <option value="4">🎮 Розваги</option>
                        <option value="5">💰 Зарплата (Дохід)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Коментар (необов'язково)</label>
                    <input type="text" id="tx-comment" class="form-control" placeholder="Наприклад: Обід з колегами">
                </div>

                <button class="btn btn-primary" id="btn-submit-tx" onclick="submitTransaction()">Зберегти</button>
            </div>
        </div>

    </div>

    <script>
        // --- Глобальні змінні ---
        let currentTxType = 'expense';
        let myChart = null;
        const API_BASE = 'http://localhost:8085/api';

        // --- Мокові (тестові) дані для UI до підключення бекенду ---
        const MOCK_DATA = {
            balance: 14550.00,
            analytics: {
                labels: ['Їжа', 'Транспорт', 'Супермаркети', 'Розваги'],
                data: [3500, 1200, 4800, 1500]
            },
            transactions: [
                { id: 1, type: 'expense', amount: 450.50, categoryName: 'Супермаркети', icon: '🛒', date: 'Сьогодні, 14:20' },
                { id: 2, type: 'expense', amount: 150.00, categoryName: 'Транспорт', icon: '🚗', date: 'Сьогодні, 09:15' },
                { id: 3, type: 'income', amount: 15000.00, categoryName: 'Зарплата', icon: '💰', date: 'Вчора, 18:00' },
                { id: 4, type: 'expense', amount: 800.00, categoryName: 'Розваги', icon: '🎮', date: '23 Жовтня, 21:00' },
                { id: 5, type: 'expense', amount: 320.00, categoryName: 'Їжа', icon: '🍔', date: '23 Жовтня, 13:40' }
            ]
        };

        // --- Ініціалізація додатку ---
        document.addEventListener('DOMContentLoaded', () => {
            fetchDataAndRender();
        });

        // Головна функція отримання даних (з Fallback на мокові дані)
        async function fetchDataAndRender() {
            try {
                // Спроба отримати реальний баланс з твого C++ сервера
                const res = await fetch(`${API_BASE}/balance`);
                if (!res.ok) throw new Error("Сервер не відповідає");
                const data = await res.json();
                
                renderBalance(data.name, data.balance);
                
                // Завантажуємо реальну аналітику
                const resAnalytics = await fetch(`${API_BASE}/analytics`);
                if (resAnalytics.ok) {
                    const analyticsData = await resAnalytics.json();
                    // Якщо витрат ще немає, показуємо порожній графік
                    if (analyticsData.labels.length === 0) {
                         renderChart(['Немає витрат'], [1]);
                    } else {
                         renderChart(analyticsData.labels, analyticsData.data);
                    }
                }

                // Завантажуємо реальну історію транзакцій
                const resTx = await fetch(`${API_BASE}/transactions`);
                if (resTx.ok) {
                    const txData = await resTx.json();
                    renderTransactions(txData);
                }
                
            } catch (error) {
                console.log("Бекенд недоступний, завантажуємо тестові дані UI/UX...");
                renderBalance("Main Card (Mock)", MOCK_DATA.balance);
                renderChart(MOCK_DATA.analytics.labels, MOCK_DATA.analytics.data);
                renderTransactions(MOCK_DATA.transactions);
            }
        }

        // --- Відображення Балансу ---
        function renderBalance(name, balance) {
            document.getElementById('acc-name').innerText = name;
            // Форматування числа з пробілами (напр. 10 000.00)
            document.getElementById('acc-balance').innerText = balance.toLocaleString('uk-UA', { minimumFractionDigits: 2 }) + ' ₴';
        }

        // --- Робота з Chart.js (Аналітика) ---
        // Відповідь на питання: Як вивести кругову діаграму використовуючи getAnalytics
        function renderChart(labels, dataArray) {
            const ctx = document.getElementById('expensesChart').getContext('2d');
            
            if (myChart) myChart.destroy(); // Очищаємо старий графік при оновленні

            myChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: labels,
                    datasets: [{
                        data: dataArray,
                        backgroundColor: [
                            '#ef4444', // Червоний
                            '#f59e0b', // Жовтий
                            '#3b82f6', // Синій
                            '#8b5cf6', // Фіолетовий
                            '#10b981'  // Зелений
                        ],
                        borderWidth: 0,
                        hoverOffset: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    cutout: '75%', // Товщина кільця (виглядає сучасно)
                    plugins: {
                        legend: { position: 'right', labels: { usePointStyle: true, boxWidth: 8, font: { family: 'system-ui' } } }
                    }
                }
            });
        }

        // --- Відображення списку транзакцій ---
        function renderTransactions(transactions) {
            const list = document.getElementById('transactions-list');
            list.innerHTML = '';

            transactions.forEach(tx => {
                const isIncome = tx.type === 'income';
                const sign = isIncome ? '+' : '-';
                const colorClass = isIncome ? 'income' : 'expense';
                
                list.innerHTML += `
                    <div class="transaction-item">
                        <div class="tx-info">
                            <div class="tx-icon">${tx.icon}</div>
                            <div class="tx-details">
                                <h4>${tx.categoryName}</h4>
                                <p>${tx.date}</p>
                            </div>
                        </div>
                        <div class="tx-amount ${colorClass}">${sign} ${tx.amount.toFixed(2)} ₴</div>
                    </div>
                `;
            });
        }

        // --- Логіка Модального вікна ---
        function openModal(type) {
            currentTxType = type;
            document.getElementById('modal-title').innerText = type === 'income' ? 'Додати дохід' : 'Додати витрату';
            document.getElementById('tx-amount').value = '';
            document.getElementById('tx-comment').value = '';
            document.getElementById('transaction-modal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('transaction-modal').classList.remove('active');
        }

        // --- Відправка транзакції на бекенд ---
        async function submitTransaction() {
            const amount = parseFloat(document.getElementById('tx-amount').value);
            const categoryId = parseInt(document.getElementById('tx-category').value);
            const isIncome = (currentTxType === 'income');
            const date = new Date().toISOString().split('T')[0];

            if (isNaN(amount) || amount <= 0) {
                alert("Будь ласка, введіть коректну суму!");
                return;
            }

            const payload = { amount, isIncome, categoryId, date };

            try {
                const response = await fetch(`${API_BASE}/transaction`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    closeModal();
                    fetchDataAndRender(); // Оновлюємо дані на екрані
                } else {
                    const err = await response.text();
                    alert("Помилка: " + err);
                }
            } catch (error) {
                console.error("Деталі мережевої помилки:", error);
                alert("Помилка мережі: " + error.message + "\n\nНатисніть F12 на клавіатурі і перевірте вкладку Console (Консоль) для деталей.");
            }
        }
    </script>
</body>
</html>
