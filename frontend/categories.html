<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Monefy Web | Управління категоріями</title>
    <link rel="stylesheet" href="style.css">
    <script>
        const token = localStorage.getItem('token');
        if (!token || token === 'undefined' || token === 'null') {
            window.location.replace('auth.html');
        }
    </script>
    <script src="auth-api.js"></script>

    <style>
        .content {
            padding: 20px;
            flex-grow: 1;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(105px, 1fr));
            gap: 14px;
            align-content: start;
            padding-bottom: 96px;
        }

        .category-card {
            background-color: var(--bg-card);
            border-radius: 14px;
            padding: 16px 10px;
            border: 1.5px solid transparent;
            box-shadow: 0 6px 14px rgba(15, 23, 42, 0.05);
            transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .category-card:hover {
            transform: translateY(-4px);
            border-color: var(--color-primary);
            box-shadow: 0 10px 22px rgba(15, 23, 42, 0.08);
        }
        .cat-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            gap: 12px;
        }
        .cat-info {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }
        .cat-icon {
            width: 52px;
            height: 52px;
            border-radius: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 28px;
            margin-bottom: 4px;
        }
        .cat-name {
            font-size: 14px;
            font-weight: 700;
            text-align: center;
            color: var(--text-main);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            width: 100%;
        }
        .cat-actions {
            display: flex;
            justify-content: space-around;
            width: 100%;
            gap: 8px;
            margin-top: 4px;
        }
        .action-btn {
            background: #f8fafc;
            border: none;
            width: 28px;
            height: 28px;
            border-radius: 9px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 13px;
            cursor: pointer;
            transition: background 0.18s ease, transform 0.18s ease;
        }
        .action-btn:hover { background: #e2e8f0; transform: translateY(-1px); }

        .budget-block { margin-top: 16px; }
        .progress-bg {
            width: 100%;
            height: 8px;
            background-color: #e2e8f0;
            border-radius: 4px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.5s ease-out, background-color 0.3s;
        }
        .budget-text {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 8px;
            font-weight: 500;
        }
        .budget-text .danger { color: var(--color-danger); font-weight: 700; }

        .emoji-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(42px, 1fr));
            gap: 6px;
            margin-top: 8px;
        }
        .emoji-item {
            aspect-ratio: 1;
            display: flex; justify-content: center; align-items: center;
            font-size: 20px; background: #f1f5f9; border-radius: 10px;
            cursor: pointer; border: 2px solid transparent; transition: all 0.2s ease;
        }
        .emoji-item:hover { background: #e2e8f0; }
        .emoji-item.active { background: #fff; border-color: var(--color-primary); box-shadow: 0 2px 8px rgba(59, 130, 246, 0.15); }

        .color-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(32px, 1fr));
            gap: 10px;
            margin-top: 8px;
        }
        .color-item {
            width: 28px; height: 28px; border-radius: 50%; cursor: pointer;
            border: 2px solid #fff; box-shadow: 0 0 0 1px #e2e8f0;
            transition: all 0.2s ease;
        }
        .color-item.active { transform: scale(1.1); box-shadow: 0 0 0 2px var(--color-primary); }

        #category-modal .modal-content {
            max-height: 85vh;
            overflow-y: auto;
            padding: 20px;
        }

        #category-modal .modal-header { margin-bottom: 14px; }
        #category-modal .form-group { margin-bottom: 12px; }
        #category-modal .form-control { padding: 11px 12px; font-size: 15px; border-radius: 11px; }
        #category-modal .btn-primary {
            position: sticky;
            bottom: 0;
            height: 48px;
            padding: 0 16px;
            margin: 10px -2px 0;
            border-radius: 14px;
            box-shadow: 0 -10px 24px rgba(255, 255, 255, 0.9), 0 8px 18px rgba(59, 130, 246, 0.22);
        }

    
        @media (min-width: 800px) {
            .app-container {
                max-width: none;
                grid-template-columns: 90px 1fr;
                grid-template-rows: 80px 1fr;
            }
            #categories-container {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(128px, 1fr));
                gap: 12px;
                align-content: start;
            }

            .content {
                overflow-y: auto;
                max-height: calc(100vh - 160px);
                padding: 18px;
            }

            .category-card { min-height: 116px; }
        }

        @media (min-width: 1100px) {
            #categories-container {
                grid-template-columns: repeat(6, minmax(120px, 150px));
            }
        }
    </style>
</head>
<body>

    <div class="app-container">
        
        <header class="header">
            <div class="title">Категорії</div>
            <div class="spacer"></div>
        </header>

        <div class="content" id="categories-container">
        </div>

        <button class="fab" onclick="openModal()">+</button>

        <div class="modal-overlay" id="category-modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2 id="modal-title">Нова категорія</h2>
                    <button class="btn-close" onclick="closeModal()">×</button>
                </div>
                
                <div class="form-group">
                    <label>Тип категорії</label>
                    <select id="cat-type" class="form-control">
                        <option value="expense">📉 Витрата</option>
                        <option value="income">📈 Дохід (Ціль)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Назва категорії</label>
                    <input type="text" id="cat-name" class="form-control" placeholder="Наприклад: Кав'ярні">
                </div>

                <div class="form-group">
                    <label>Іконка (Емодзі)</label>
                    <div class="emoji-grid" id="emoji-grid">
                        <div class="emoji-item active">🍔</div>
                        <div class="emoji-item">🛒</div>
                        <div class="emoji-item">🚗</div>
                        <div class="emoji-item">🎮</div>
                        <div class="emoji-item">☕</div>
                        <div class="emoji-item">💊</div>
                        <div class="emoji-item">👕</div>
                        <div class="emoji-item">✈️</div>
                        <div class="emoji-item">🏠</div>
                        <div class="emoji-item">🎁</div>
                    </div>
                </div>

                <div class="form-group">
                    <label>Колір</label>
                    <div class="color-grid" id="color-grid">
                        <div class="color-item active" style="background-color: #ef4444;" data-color="#ef4444"></div>
                        <div class="color-item" style="background-color: #f59e0b;" data-color="#f59e0b"></div>
                        <div class="color-item" style="background-color: #10b981;" data-color="#10b981"></div>
                        <div class="color-item" style="background-color: #3b82f6;" data-color="#3b82f6"></div>
                        <div class="color-item" style="background-color: #8b5cf6;" data-color="#8b5cf6"></div>
                        <div class="color-item" style="background-color: #ec4899;" data-color="#ec4899"></div>
                    </div>
                </div>

                <button class="btn-primary" onclick="saveCategory()">Зберегти</button>
            </div>
        </div>

        <nav class="bottom-nav">
            <a href="index.html" class="nav-item">
                <span class="nav-icon">🏠</span>
                <span>Головна</span>
            </a>
            <a href="history.html" class="nav-item">
                <span class="nav-icon">📜</span>
                <span>Історія</span>
            </a>
            <a href="accounts.html" class="nav-item">
                <span class="nav-icon">💳</span>
                <span>Рахунки</span>
            </a>
            <a href="categories.html" class="nav-item active">
                <span class="nav-icon">🗂</span>
                <span>Категорії</span>
            </a>
        </nav>
    </div>

    <script>
        const API_BASE = 'http://localhost:8085/api';
        let currentCategories = [];
        let editingCategoryId = null;

        async function fetchCategories() {
            try {
                const response = await apiFetch(`${API_BASE}/categories`);
                if (!response.ok) throw new Error('Мережева помилка');
                currentCategories = await response.json();
                renderCategories();
            } catch (error) {
                console.error("Помилка завантаження:", error);
                document.getElementById('categories-container').innerHTML = 
                    '<p style="text-align:center; color: var(--text-muted); padding: 20px;">Не вдалося завантажити категорії з сервера</p>';
            }
        }

        function renderCategories() {
            const container = document.getElementById('categories-container');
            container.innerHTML = '';

            if (currentCategories.length === 0) {
                container.innerHTML = '<p style="grid-column:1/-1;text-align:center;color:var(--text-muted);padding:24px;">Немає категорій</p>';
                return;
            }

            currentCategories.forEach(cat => {
                const iconBg = cat.color + '33';

                container.innerHTML += `
                    <div class="category-card">
                        <div class="cat-header">
                            <div class="cat-info">
                                <div class="cat-icon" style="background-color: ${iconBg}; color: ${cat.color};">${cat.icon}</div>
                                <div class="cat-name">${cat.name}</div>
                            </div>
                            <div class="cat-actions">
                                <button class="action-btn" title="Редагувати" onclick="editCategory(${cat.id})">✏️</button>
                                <button class="action-btn" title="Видалити" onclick="deleteCategory(${cat.id})">🗑️</button>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        function openModal() {
            document.getElementById('category-modal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('category-modal').classList.remove('active');
            
            editingCategoryId = null;
            document.getElementById('modal-title').innerText = 'Нова категорія';
            
            document.getElementById('cat-name').value = '';
            document.getElementById('cat-type').value = 'expense';
            
            const limitInput = document.getElementById('cat-limit');
            if (limitInput) limitInput.value = '';
            
            const emojis = document.querySelectorAll('#emoji-grid .emoji-item');
            emojis.forEach(el => el.classList.remove('active'));
            if(emojis.length > 0) emojis[0].classList.add('active');

            const colors = document.querySelectorAll('#color-grid .color-item');
            colors.forEach(el => el.classList.remove('active'));
            if(colors.length > 0) colors[0].classList.add('active');
        }

        function editCategory(id) {
            const cat = currentCategories.find(c => c.id === id);
            if (!cat) return;

            editingCategoryId = id;
            document.getElementById('modal-title').innerText = 'Редагувати категорію';
            
            document.getElementById('cat-name').value = cat.name;
            document.getElementById('cat-type').value = cat.isIncome ? 'income' : 'expense';
            
            const limitInput = document.getElementById('cat-limit');
            if (limitInput) limitInput.value = cat.limit || '';

            const emojis = document.querySelectorAll('#emoji-grid .emoji-item');
            emojis.forEach(el => {
                el.classList.remove('active');
                if (el.innerText.trim() === cat.icon) el.classList.add('active');
            });

            const colors = document.querySelectorAll('#color-grid .color-item');
            colors.forEach(el => {
                el.classList.remove('active');
                if (el.getAttribute('data-color') === cat.color) el.classList.add('active');
            });

            openModal();
        }

        async function deleteCategory(id) {
            if (!confirm("Ви впевнені, що хочете видалити цю категорію?")) return;

            try {
                const response = await apiFetch(`${API_BASE}/category/${id}`, {
                    method: 'DELETE'
                });

                if (response.ok) {
                    fetchCategories();
                } else {
                    const err = await response.text();
                    alert("Помилка видалення: " + err);
                }
            } catch (error) {
                console.error("Помилка:", error);
                alert("Не вдалося з'єднатися з сервером.");
            }
        }

        async function saveCategory() {
            const name = document.getElementById('cat-name').value.trim();
            const isIncome = document.getElementById('cat-type').value === 'income';
            
            const activeEmojiEl = document.querySelector('#emoji-grid .emoji-item.active');
            const icon = activeEmojiEl ? activeEmojiEl.innerText.trim() : '🍔';
            
            const activeColorEl = document.querySelector('#color-grid .color-item.active');
            const color = activeColorEl ? activeColorEl.getAttribute('data-color') : '#ef4444';
            
            const limitInput = document.getElementById('cat-limit');
            const limit = limitInput ? (parseFloat(limitInput.value) || 0) : 0;

            if (!name) {
                alert("Будь ласка, введіть назву категорії.");
                return;
            }

            const payload = { name, isIncome, icon, color, limit };
            
            if (editingCategoryId !== null) {
                payload.id = editingCategoryId;
            }
            
            const reqMethod = editingCategoryId !== null ? 'PUT' : 'POST';

            try {
                const response = await apiFetch(`${API_BASE}/category`, {
                    method: reqMethod,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    closeModal();
                    fetchCategories();
                } else {
                    const err = await response.text();
                    alert("Помилка збереження: " + err);
                }
            } catch (error) {
                console.error("Деталі помилки:", error);
                alert("Не вдалося з'єднатися з сервером.");
            }
        }

        function setupSelectors(containerId, itemClass) {
            const items = document.querySelectorAll(`#${containerId} .${itemClass}`);
            items.forEach(item => {
                item.addEventListener('click', () => {
                    items.forEach(i => i.classList.remove('active'));
                    item.classList.add('active');
                });
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            setupSelectors('emoji-grid', 'emoji-item');
            setupSelectors('color-grid', 'color-item');
            fetchCategories();
        });
    </script>
</body>
</html>
