<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Monefy - Авторизація</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Специфічні стилі для сторінки авторизації */
        .auth-container {
            width: 100%;
            max-width: 400px;
            background-color: var(--bg-card);
            border-radius: var(--radius-main);
            box-shadow: var(--shadow-card);
            padding: 30px;
            margin: auto;
            align-items: center;
        }
        .logo {
            text-align: center;
            color: var(--text-main);
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 20px;
        }
        .logo span { color: var(--color-primary); }
        .tabs {
            display: flex;
            margin-bottom: 20px;
            border-bottom: 2px solid #e2e8f0;
        }
        .tab {
            flex: 1;
            text-align: center;
            padding: 12px;
            cursor: pointer;
            font-weight: 700;
            color: var(--text-muted);
            transition: 0.3s;
        }
        .tab.active {
            color: var(--color-primary);
            border-bottom: 2px solid var(--color-primary);
            margin-bottom: -2px;
        }
        .form-container {
            display: none;
        }
        .form-container.active {
            display: block;
            animation: fadeIn 0.4s ease;
        }
        .error-msg {
            color: var(--color-danger);
            font-size: 13px;
            text-align: center;
            margin-top: 10px;
            min-height: 18px;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="logo">Monefy <span>Web</span></div>
        
        <div class="tabs">
            <div class="tab active" onclick="switchTab('login')">Вхід</div>
            <div class="tab" onclick="switchTab('register')">Реєстрація</div>
        </div>

        <div id="login-form" class="form-container active">
            <div class="form-group">
                <label>Логін (Username)</label>
                <input type="text" id="login-username" class="form-control" placeholder="Введіть логін">
            </div>
            <div class="form-group">
                <label>Пароль</label>
                <input type="password" id="login-password" class="form-control" placeholder="••••••••">
            </div>
            <button class="btn-primary" onclick="authenticate('login')">Увійти</button>
            <div class="error-msg" id="login-error"></div>
        </div>

        <div id="register-form" class="form-container">
            <div class="form-group">
                <label>Логін (Username)</label>
                <input type="text" id="reg-username" class="form-control" placeholder="Придумайте логін">
            </div>
            <div class="form-group">
                <label>Пароль</label>
                <input type="password" id="reg-password" class="form-control" placeholder="••••••••">
            </div>
            <button class="btn-primary" style="background-color: var(--color-income);" onclick="authenticate('register')">Створити акаунт</button>
            <div class="error-msg" id="reg-error"></div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8085/api';

        // Перемикання вкладок
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.form-container').forEach(f => f.classList.remove('active'));
            
            if (tab === 'login') {
                document.querySelectorAll('.tab')[0].classList.add('active');
                document.getElementById('login-form').classList.add('active');
            } else {
                document.querySelectorAll('.tab')[1].classList.add('active');
                document.getElementById('register-form').classList.add('active');
            }
            // Очищаємо помилки при перемиканні
            document.getElementById('login-error').innerText = '';
            document.getElementById('reg-error').innerText = '';
        }

        // Універсальна функція для Логіну та Реєстрації
        async function authenticate(action) {
            const isLogin = action === 'login';
            const prefix = isLogin ? 'login' : 'reg';
            
            const username = document.getElementById(`${prefix}-username`).value.trim();
            const password = document.getElementById(`${prefix}-password`).value.trim();
            const errorDiv = document.getElementById(`${prefix}-error`);

            if (!username || !password) {
                errorDiv.innerText = "Заповніть всі поля!";
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/${action}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                if (response.ok) {
                    const data = await response.json();
                    // ЗБЕРІГАЄМО ТОКЕН!
                    localStorage.setItem('token', data.token);
                    window.location.href = 'index.html'; // Редирект на головну
                } else {
                    const err = await response.text();
                    errorDiv.innerText = err || "Помилка авторизації";
                }
            } catch (error) {
                console.error(error);
                errorDiv.innerText = "Помилка: " + error.message;
            }
        }
    </script>
</body>
</html>
