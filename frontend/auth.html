<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monefy - Авторизація</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e293b;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .auth-card {
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            width: 320px;
            position: relative;
            overflow: hidden;
        }
        .logo {
            text-align: center;
            color: #0f172a;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
        }
        .tabs {
            display: flex;
            margin-bottom: 20px;
            border-bottom: 2px solid #e2e8f0;
        }
        .tab {
            flex: 1;
            text-align: center;
            padding: 10px;
            cursor: pointer;
            font-weight: bold;
            color: #64748b;
            transition: 0.3s;
        }
        .tab.active {
            color: #3b82f6;
            border-bottom: 2px solid #3b82f6;
            margin-bottom: -2px;
        }
        .form-container {
            display: none; /* Приховуємо форми за замовчуванням */
        }
        .form-container.active {
            display: block; /* Показуємо тільки активну */
            animation: fadeIn 0.3s;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .input-group {
            margin-bottom: 15px;
        }
        .input-group label {
            display: block;
            font-size: 13px;
            color: #475569;
            margin-bottom: 5px;
            font-weight: bold;
        }
        .input-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 14px;
            outline: none;
            transition: 0.2s;
        }
        .input-group input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        .btn {
            width: 100%;
            padding: 12px;
            background-color: #3b82f6;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 10px;
        }
        .btn:hover { background-color: #2563eb; }
        .btn:active { transform: scale(0.98); }
        .error-msg {
            color: #ef4444;
            font-size: 13px;
            text-align: center;
            margin-top: 10px;
            min-height: 18px;
        }
        .forgot-pass {
            display: block;
            text-align: right;
            font-size: 12px;
            color: #3b82f6;
            text-decoration: none;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <div class="auth-card">
        <div class="logo">💰 Monefy Web</div>
        
        <div class="tabs">
            <div class="tab active" onclick="switchTab('login')">Вхід</div>
            <div class="tab" onclick="switchTab('register')">Реєстрація</div>
        </div>

        <div id="login-form" class="form-container active">
            <div class="input-group">
                <label>Email</label>
                <input type="email" id="login-email" placeholder="mail@example.com">
            </div>
            <div class="input-group">
                <label>Пароль</label>
                <input type="password" id="login-password" placeholder="••••••••">
                <a href="#" class="forgot-pass" onclick="alert('Функція відновлення пароля буде додана пізніше!')">Забули пароль?</a>
            </div>
            <button class="btn" onclick="login()">Увійти</button>
            <div class="error-msg" id="login-error"></div>
        </div>

        <div id="register-form" class="form-container">
            <div class="input-group">
                <label>Email</label>
                <input type="email" id="reg-email" placeholder="mail@example.com">
            </div>
            <div class="input-group">
                <label>Пароль</label>
                <input type="password" id="reg-password" placeholder="Мінімум 6 символів">
            </div>
            <div class="input-group">
                <label>Підтвердження пароля</label>
                <input type="password" id="reg-password-confirm" placeholder="Повторіть пароль">
            </div>
            <button class="btn" onclick="register()">Створити акаунт</button>
            <div class="error-msg" id="reg-error"></div>
        </div>
    </div>

    <script>
        // Перемикання вкладок
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.form-container').forEach(f => f.classList.remove('active'));
            
            if (tab === 'login') {
                document.querySelectorAll('.tab')[0].classList.add('active');
                document.getElementById('login-form').classList.add('active');
            } else {
                document.querySelectorAll('.tab')[1].classList.add('active');
                document.getElementById('register-form').classList.add('active');
            }
            // Очищаємо помилки при перемиканні
            document.getElementById('login-error').innerText = '';
            document.getElementById('reg-error').innerText = '';
        }

        // Логіка ВХОДУ
        function login() {
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-password').value;
            const errorDiv = document.getElementById('login-error');

            if (!email || !pass) {
                errorDiv.innerText = "Заповніть всі поля!";
                return;
            }

            // Відправка на C++ сервер
            fetch('http://localhost:8085/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: email, password: pass })
            })
            .then(res => {
                if (res.ok) {
                    // Якщо сервер сказав ОК - перекидаємо на головну!
                    window.location.href = 'index.html';
                } else {
                    errorDiv.innerText = "Невірний логін або пароль";
                }
            })
            .catch(() => errorDiv.innerText = "Помилка з'єднання з сервером!");
        }

        // Логіка РЕЄСТРАЦІЇ
        function register() {
            const email = document.getElementById('reg-email').value;
            const pass = document.getElementById('reg-password').value;
            const passConfirm = document.getElementById('reg-password-confirm').value;
            const errorDiv = document.getElementById('reg-error');

            if (!email || !pass || !passConfirm) {
                errorDiv.innerText = "Заповніть всі поля!";
                return;
            }
            if (pass !== passConfirm) {
                errorDiv.innerText = "Паролі не співпадають!";
                return;
            }

            // Відправка на C++ сервер
            fetch('http://localhost:8085/api/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: email, password: pass })
            })
            .then(res => {
                if (res.ok) {
                    alert("Реєстрація успішна! Тепер увійдіть.");
                    switchTab('login'); // Перекидаємо на вкладку логіну
                } else {
                    errorDiv.innerText = "Помилка при реєстрації";
                }
            })
            .catch(() => errorDiv.innerText = "Помилка з'єднання з сервером!");
        }
    </script>
</body>
</html>
